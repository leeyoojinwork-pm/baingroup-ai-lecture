<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>자료 → 정리 → AI → 결과 (세로 애니메이션)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--ink:#1d2740;--muted:#6b7384;--accent:#2f5fae;--soft:#eef3fb;--line:#e8ebf2;--bg:#f5f7fb;--ok:#1f9d6b}
*{box-sizing:border-box;margin:0}html,body{height:100%}
body{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:14px;
  font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans CJK KR",system-ui,sans-serif;color:var(--ink)}
.stage{width:100%;max-width:540px;aspect-ratio:3/4;background:#fff;border:1px solid var(--line);border-radius:20px;
  box-shadow:0 18px 48px -24px rgba(20,30,55,.22);padding:clamp(22px,4.4vw,34px);display:flex;flex-direction:column}
.eyebrow{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.14em}
h1{margin-top:9px;font-size:clamp(20px,4.6vw,26px);font-weight:900;line-height:1.32;letter-spacing:-.02em}
h1 b{color:var(--accent)}
.list{position:relative;flex:1;margin-top:clamp(20px,4vw,30px);padding-left:42px;display:flex;flex-direction:column;justify-content:space-between}
.rail{position:absolute;left:17px;top:8px;bottom:8px;width:2px;background:var(--line);border-radius:2px}
.rail i{position:absolute;left:0;top:0;width:100%;height:0;background:var(--accent);border-radius:2px;animation:fill 8s infinite linear}
@keyframes fill{0%{height:4%}25%{height:33%}50%{height:62%}75%{height:90%}100%{height:100%}}
.step{position:relative;display:flex;flex-direction:column;gap:3px;animation:on 8s infinite}
.step .m{position:absolute;left:-42px;top:-2px;width:34px;height:34px;border-radius:50%;background:#fff;border:2px solid var(--line);
  display:grid;place-items:center;font-weight:900;font-size:14px;color:var(--muted);transition:.4s;z-index:1}
.step h3{font-size:clamp(16px,3.4vw,20px);font-weight:900}
.step p{font-size:clamp(12.5px,2.7vw,15px);color:var(--muted);line-height:1.45}
.step:nth-child(1){animation-delay:0s}.step:nth-child(2){animation-delay:2s}.step:nth-child(3){animation-delay:4s}.step:nth-child(4){animation-delay:6s}
@keyframes on{0%,2%{}/*active*/ }
.step{--a:0}
.step.act .m,.step:nth-child(1){}
@keyframes mk{0%,2%{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.08)}25%{background:var(--accent);border-color:var(--accent);color:#fff}30%,100%{background:#fff;border-color:var(--line);color:var(--muted);transform:none}}
.step .m{animation:mk 8s infinite}
.step:nth-child(1) .m{animation-delay:0s}.step:nth-child(2) .m{animation-delay:2s}.step:nth-child(3) .m{animation-delay:4s}.step:nth-child(4) .m{animation-delay:6s}
@keyframes ht{0%,2%{color:var(--accent)}25%{color:var(--accent)}30%,100%{color:var(--ink)}}
.step h3{animation:ht 8s infinite}
.step:nth-child(1) h3{animation-delay:0s}.step:nth-child(2) h3{animation-delay:2s}.step:nth-child(3) h3{animation-delay:4s}.step:nth-child(4) h3{animation-delay:6s}
.foot{margin-top:clamp(18px,3.6vw,26px);font-size:clamp(12px,2.6vw,14px);color:var(--muted);font-weight:600;border-top:1px solid var(--line);padding-top:14px}
.foot b{color:var(--accent);font-weight:800}
</style></head>
<body>
<div class="stage">
  <div class="eyebrow">자료 정리 루틴</div>
  <h1>데이터가 정리되어야<br><b>AI가 제대로</b> 일합니다.</h1>
  <div class="list">
    <div class="rail"><i></i></div>
    <div class="step"><span class="m">1</span><h3>자료 모으기</h3><p>요청서·교안·메일을 한곳에 모읍니다.</p></div>
    <div class="step"><span class="m">2</span><h3>기준 정하기</h3><p>문서 톤·목차·검토 기준을 따로 정리합니다.</p></div>
    <div class="step"><span class="m">3</span><h3>AI에 맡기기</h3><p>Gemini로 정리하고 ChatGPT로 완성합니다.</p></div>
    <div class="step"><span class="m">4</span><h3>결과 남기기</h3><p>초안·템플릿·제출문을 다시 쓰게 남깁니다.</p></div>
  </div>
  <div class="foot"><b>핵심</b> · 흩어진 자료를 순서로 바꾸면 AI 결과가 안정됩니다.</div>
</div>
</body></html>
