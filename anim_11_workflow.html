<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gemini → ChatGPT → Padlet (세로 시연)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--ink:#1d2740;--muted:#6b7384;--accent:#2f5fae;--soft:#eef3fb;--line:#e8ebf2;--bg:#f5f7fb;--g:#3f7d5a;--ok:#1f9d6b}
*{box-sizing:border-box;margin:0}html,body{height:100%}
body{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:14px;
  font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans CJK KR",system-ui,sans-serif;color:var(--ink)}
.stage{width:100%;max-width:540px;aspect-ratio:3/4;background:#fff;border:1px solid var(--line);border-radius:20px;
  box-shadow:0 18px 48px -24px rgba(20,30,55,.22);padding:clamp(20px,4vw,30px);display:flex;flex-direction:column}
.eyebrow{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.14em}
h1{margin-top:9px;font-size:clamp(19px,4.2vw,25px);font-weight:900;line-height:1.3;letter-spacing:-.02em}
h1 b{color:var(--accent)}
.flow{flex:1;margin-top:clamp(14px,2.8vw,22px);display:flex;flex-direction:column;align-items:stretch;gap:0}
.panel{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;transition:border-color .4s,box-shadow .4s;animation:on 9s infinite}
.panel:nth-of-type(1){animation-delay:0s}.panel:nth-of-type(3){animation-delay:3s}.panel:nth-of-type(5){animation-delay:6s}
@keyframes on{0%,2%{border-color:var(--accent);box-shadow:0 10px 24px -12px rgba(47,95,174,.4)}30%{border-color:var(--accent)}34%,100%{border-color:var(--line);box-shadow:none}}
.pt{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--line);font-weight:800;font-size:13px}
.pt .ic{width:16px;height:16px;border-radius:5px;background:var(--accent)}.pt.gem .ic{background:var(--g)}
.pt .f{margin-left:auto;font-size:10.5px;color:var(--muted);font-weight:700}
.sc{padding:clamp(9px,1.8vw,13px);display:flex;flex-direction:column;gap:6px}
.pr{font-size:12px;background:var(--soft);border-radius:7px;padding:7px 10px;font-weight:700;color:#2a3a55;opacity:0;animation:fd 9s infinite}
.tbl{display:grid;gap:4px}.tbl .tr{display:grid;grid-template-columns:1fr 1.4fr .6fr;gap:4px}
.tbl .tr>i{height:9px;border-radius:3px;background:#e6ecf5;position:relative;overflow:hidden}
.tbl .tr>i:after{content:"";position:absolute;inset:0;width:0;background:#cdd9ea;animation:wf 9s infinite}
.tbl .tr:nth-child(1)>i:after{animation-delay:.5s}.tbl .tr:nth-child(2)>i:after{animation-delay:.8s}.tbl .tr:nth-child(3)>i:after{animation-delay:1.1s}
.doc b{font-size:13px;font-weight:900;opacity:0;animation:fd 9s infinite;animation-delay:3.4s}
.doc i{display:block;height:8px;border-radius:4px;background:#e6ecf5;width:0;margin-top:5px;animation:ln 9s infinite}
.doc i:nth-of-type(1){animation-delay:3.7s}.doc i:nth-of-type(2){animation-delay:4s}.doc i:nth-of-type(3){animation-delay:4.3s}
.post{border:1px solid var(--line);border-radius:9px;padding:9px;display:flex;flex-direction:column;gap:5px;opacity:0;transform:translateY(6px);animation:pin 9s infinite;animation-delay:6.6s}
.post .tt{font-weight:800;font-size:12.5px}.post .ln{height:7px;border-radius:4px;background:#e6ecf5}.post .ln.s{width:55%}
.post .ok{align-self:flex-start;font-size:10.5px;font-weight:900;color:#fff;background:var(--ok);padding:3px 9px;border-radius:999px;opacity:0;animation:fd 9s infinite;animation-delay:7.6s}
.arrow{align-self:center;color:#c2ccdb;font-size:22px;font-weight:900;line-height:1;padding:5px 0;animation:ar 9s infinite}
.arrow:nth-of-type(2){animation-delay:2.6s}.arrow:nth-of-type(4){animation-delay:5.6s}
@keyframes ar{0%,5%{color:var(--accent);transform:translateY(3px)}20%,100%{color:#c2ccdb;transform:none}}
@keyframes fd{0%,0%{opacity:0}5%{opacity:1}100%{opacity:1}}
@keyframes wf{0%,4%{width:0}9%{width:100%}100%{width:100%}}
@keyframes ln{0%,38%{width:0}44%{width:100%}100%{width:100%}}
@keyframes pin{0%,72%{opacity:0;transform:translateY(6px)}80%{opacity:1;transform:translateY(0)}100%{opacity:1}}
.foot{margin-top:clamp(12px,2.4vw,18px);font-size:clamp(12px,2.5vw,14px);color:var(--muted);font-weight:600}
.foot b{color:var(--accent);font-weight:800}
</style></head>
<body>
<div class="stage">
  <div class="eyebrow">강사 시연 · 문서 자동화</div>
  <h1>자료 정리 → 문서 완성 →<br><b>Padlet 제출</b>까지 한 번에</h1>
  <div class="flow">
    <div class="panel"><div class="pt gem"><span class="ic"></span>Gemini<span class="f">Gemini_자료정리.md</span></div>
      <div class="sc"><div class="pr">@Drive 자료를 팩트시트로 정리해줘</div>
        <div class="tbl"><div class="tr"><i></i><i></i><i></i></div><div class="tr"><i></i><i></i><i></i></div><div class="tr"><i></i><i></i><i></i></div></div></div></div>
    <div class="arrow">⌄</div>
    <div class="panel"><div class="pt"><span class="ic"></span>ChatGPT<span class="f">ChatGPT_보고서완성.md</span></div>
      <div class="sc"><div class="doc"><b># 주간 업무 보고서</b><i></i><i></i><i></i></div></div></div>
    <div class="arrow">⌄</div>
    <div class="panel"><div class="pt"><span class="ic"></span>Padlet<span class="f">Padlet_제출문.md</span></div>
      <div class="sc"><div class="post"><div class="tt">주간 보고서 초안</div><div class="ln"></div><div class="ln s"></div><span class="ok">✓ 제출 완료</span></div></div></div>
  </div>
  <div class="foot"><b>완성 기준</b> · 정리 → 완성 → 제출을 한 번에 반복할 수 있으면 성공.</div>
</div>
</body></html>
