<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google Drive 폴더 만들기 (세로 시연)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--ink:#1d2740;--muted:#6b7384;--accent:#2f5fae;--soft:#eef3fb;--line:#e8ebf2;--bg:#f5f7fb;--fold:#5b8def}
*{box-sizing:border-box;margin:0}html,body{height:100%}
body{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:14px;
  font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans CJK KR",system-ui,sans-serif;color:var(--ink)}
.stage{width:100%;max-width:540px;aspect-ratio:3/4;background:#fff;border:1px solid var(--line);border-radius:20px;
  box-shadow:0 18px 48px -24px rgba(20,30,55,.22);padding:clamp(20px,4vw,30px);display:flex;flex-direction:column}
.eyebrow{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.14em}
h1{margin-top:9px;font-size:clamp(19px,4.2vw,25px);font-weight:900;line-height:1.3;letter-spacing:-.02em}
h1 b{color:var(--accent)}
.win{flex:1;margin-top:clamp(16px,3.2vw,24px);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;background:#fbfcff}
.bar{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line);background:#fff}
.bar .d{display:flex;gap:5px}.bar .d i{width:9px;height:9px;border-radius:50%;background:#dbe1ea}
.bar .c{font-size:13px;font-weight:800}.bar .c b{color:var(--accent)}
.bar .new{margin-left:auto;font-size:11px;font-weight:800;color:#fff;background:var(--accent);padding:6px 11px;border-radius:8px;position:relative;animation:click 12s infinite}
@keyframes click{0%,3%{transform:scale(.93)}7%,100%{transform:none}}
.bar .new:after{content:"";position:absolute;inset:-6px;border:2px solid var(--accent);border-radius:12px;opacity:0;animation:rip 12s infinite}
@keyframes rip{0%{opacity:.55;transform:scale(.8)}9%{opacity:0;transform:scale(1.3)}100%{opacity:0}}
.body{flex:1;padding:clamp(12px,2.4vw,18px);display:flex;flex-direction:column;gap:9px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:clamp(10px,2vw,13px) 14px;border:1px solid var(--line);border-radius:10px;background:#fff;opacity:0;transform:translateY(7px);animation:rin 12s infinite}
.row .fi{flex:0 0 auto;width:28px;height:21px;border-radius:4px;background:var(--soft);border:1.5px solid var(--fold);position:relative}
.row .fi:before{content:"";position:absolute;top:-5px;left:4px;width:12px;height:5px;border-radius:3px 3px 0 0;background:var(--fold)}
.row .nm{font-size:clamp(13px,2.7vw,15px);font-weight:800;line-height:1.25}
.row .nm small{display:block;color:var(--muted);font-weight:600;font-size:.78em;margin-top:1px}
.row .tag{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--accent);background:var(--soft);padding:3px 8px;border-radius:999px;opacity:0;animation:tg 12s infinite}
.row.root{border-color:var(--accent);background:#f5f9ff}.row.root .fi{background:#dde9ff;border-color:var(--accent)}.row.root .fi:before{background:var(--accent)}
.row.sub{margin-left:clamp(14px,3vw,30px)}
.row.r0{animation-delay:1s}.row.r1{animation-delay:2.6s}.row.r2{animation-delay:4s}.row.r3{animation-delay:5.4s}.row.r4{animation-delay:6.8s}.row.r5{animation-delay:8.2s}
.row.r0 .tag{animation-delay:1s}.row.r1 .tag{animation-delay:2.6s}.row.r2 .tag{animation-delay:4s}.row.r3 .tag{animation-delay:5.4s}.row.r4 .tag{animation-delay:6.8s}.row.r5 .tag{animation-delay:8.2s}
@keyframes rin{0%,7%{opacity:0;transform:translateY(7px)}11%{opacity:1;transform:translateY(0)}94%{opacity:1}100%{opacity:0}}
@keyframes tg{0%,10%{opacity:0}14%{opacity:1}28%{opacity:1}38%,100%{opacity:0}}
.foot{margin-top:clamp(14px,2.8vw,20px);font-size:clamp(12px,2.5vw,14px);color:var(--muted);font-weight:600}
.foot b{color:var(--accent);font-weight:800}
</style></head>
<body>
<div class="stage">
  <div class="eyebrow">실습 단계 01 · 폴더 준비</div>
  <h1>Drive에 <b>[AI_실습_자료]</b> 폴더 만들기</h1>
  <div class="win">
    <div class="bar"><div class="d"><i></i><i></i><i></i></div><div class="c">내 드라이브 / <b>AI_실습_자료</b></div><div class="new">＋ 새로 만들기</div></div>
    <div class="body">
      <div class="row root r0"><span class="fi"></span><span class="nm">AI_실습_자료</span><span class="tag">방금 생성됨</span></div>
      <div class="row sub r1"><span class="fi"></span><span class="nm">00_역할과_검수선<small>문서 톤 · 체크리스트</small></span><span class="tag">생성됨</span></div>
      <div class="row sub r2"><span class="fi"></span><span class="nm">01_실습자료<small>요청서 · 교안 · 메일</small></span><span class="tag">생성됨</span></div>
      <div class="row sub r3"><span class="fi"></span><span class="nm">02_작성기준<small>목차 · 톤 · 표현 기준</small></span><span class="tag">생성됨</span></div>
      <div class="row sub r4"><span class="fi"></span><span class="nm">03_작업순서<small>Gemini · ChatGPT 요청문</small></span><span class="tag">생성됨</span></div>
      <div class="row sub r5"><span class="fi"></span><span class="nm">04_결과물<small>초안 · 제출문</small></span><span class="tag">생성됨</span></div>
    </div>
  </div>
  <div class="foot"><b>실습</b> · 새로 만들기 → 폴더 → 이름을 붙여 하위 폴더를 차례로 만듭니다.</div>
</div>
</body></html>
